
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Corregir Hexagrama - Tres Monedas Avanzado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        input, button { padding: 10px; font-size: 16px; width: 100%; margin-top: 10px; }
        .result { margin-top: 20px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <h2>Corregir Hexagrama - Método Tres Monedas (Ajustado + Límite de Cambios)</h2>
    <p>Ingrese sus 6 líneas (de abajo hacia arriba) separadas por espacios. Ejemplo: <strong>6 7 8 9 6 7</strong></p>
    <input type="text" id="inputLines" placeholder="6 7 8 9 6 7">
    <button onclick="corregir()">Corregir Hexagrama</button>
    <div class="result" id="resultadoOriginal"></div>
    <div class="result" id="resultadoCorregido"></div>

    <script>
        function corregirLineaTresMonedas(v) {
            if (v === 6) {
                const roll = Math.floor(Math.random() * 4);
                if (roll === 0) return 7;
                else if (roll === 1) return 8;
                else return 6;  // 50% se mantiene
            }
            if (v === 7) {
                return (Math.floor(Math.random() * 6) === 0) ? 8 : 7;
            }
            if (v === 8) {
                const r = Math.floor(Math.random() * 8);
                if (r === 0) return 6;
                else if (r === 1) return 9;
                else return 8;
            }
            if (v === 9) {
                return (Math.floor(Math.random() * 2) === 0) ? 8 : 9;
            }
            return null;
        }

        function limitarCambios(hex) {
            const mutantes = hex.map((v, i) => (v === 6 || v === 9) ? i : null).filter(i => i !== null);
            if (mutantes.length <= 2) return hex;
            const indicesConservar = mutantes.sort(() => 0.5 - Math.random()).slice(0, 2);
            return hex.map((v, i) => {
                if ((v === 6 || v === 9) && !indicesConservar.includes(i)) {
                    return v === 6 ? 8 : 7;
                }
                return v;
            });
        }

        function corregir() {
            const input = document.getElementById("inputLines").value.trim();
            const valores = input.split(" ").map(Number);

            if (valores.length !== 6 || !valores.every(v => [6,7,8,9].includes(v))) {
                alert("Ingrese exactamente 6 números válidos entre 6 y 9.");
                return;
            }

            const original = [...valores];
            const corregidosInicial = valores.map(corregirLineaTresMonedas);
            const corregidosFinal = limitarCambios(corregidosInicial);

            document.getElementById("resultadoOriginal").innerText = "Original: " + original.join(" ");
            document.getElementById("resultadoCorregido").innerText = "Corregido: " + corregidosFinal.join(" ");
        }
    </script>
</body>
</html>
